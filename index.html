<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Gabriel Marques Piza - IA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
        }
        .header-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .header-subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        #start-btn {
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        #webcam-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        #webcam-container canvas {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 300px;
            height: auto;
            object-fit: cover;
        }
        .progress {
            height: 24px;
            border-radius: 12px;
            background-color: #e9ecef;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }
        .progress-bar {
            font-weight: bold;
            font-size: 0.85rem;
            line-height: 24px;
            transition: width 0.2s ease;
        }
        .class-label {
            font-weight: 600;
            color: #34495e;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <div class="main-card text-center">
        <h2 class="header-title">Site Gabriel Marques Piza</h2>
        <p class="header-subtitle">Reconhecimento de Imagem com IA</p>
        
        <button id="start-btn" type="button" class="btn btn-primary btn-lg w-100" onclick="init()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-camera-video-fill me-2 mb-1" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M0 5a2 2 0 0 1 2-2h7.5a2 2 0 0 1 1.983 1.738l3.11-1.382A1 1 0 0 1 16 4.269v7.462a1 1 0 0 1-1.406.913l-3.111-1.382A2 2 0 0 1 9.5 13H2a2 2 0 0 1-2-2z"/>
            </svg>
            Iniciar Câmera
        </button>

        <div id="webcam-container"></div>
        <div id="label-container" class="text-start mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/htPLzuA9r/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            // Atualiza o botão para estado de carregamento
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = true;
            startBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Acessando câmera...';
            startBtn.classList.replace("btn-primary", "btn-secondary");

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // Carrega o modelo de imagem
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Configuração da Webcam
            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); // Resolução otimizada para o layout
            await webcam.setup(); // Solicita permissão da câmera
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Anexa o canvas da câmera ao DOM
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // Oculta o botão após a câmera abrir
            startBtn.style.display = 'none';

            // Configura a área das barras de progresso (Range)
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ''; // Limpa o container
            
            for (let i = 0; i < maxPredictions; i++) {
                // Div principal para cada classe
                const classWrapper = document.createElement("div");
                classWrapper.className = "mb-3";

                // Texto do Nome da Classe
                const labelText = document.createElement("div");
                labelText.className = "class-label";
                labelText.id = "class-name-" + i;
                
                // Estrutura da Barra de Progresso do Bootstrap
                const progressContainer = document.createElement("div");
                progressContainer.className = "progress";
                
                const progressBar = document.createElement("div");
                progressBar.className = "progress-bar progress-bar-striped progress-bar-animated";
                progressBar.id = "class-progress-" + i;
                progressBar.role = "progressbar";
                progressBar.style.width = "0%";
                progressBar.innerHTML = "0%";

                // Monta a estrutura no DOM
                progressContainer.appendChild(progressBar);
                classWrapper.appendChild(labelText);
                classWrapper.appendChild(progressContainer);
                labelContainer.appendChild(classWrapper);
            }
        }

        async function loop() {
            webcam.update(); // Atualiza o frame da câmera
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // Roda a imagem da câmera pelo modelo
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);

                // Atualiza o nome da classe
                document.getElementById("class-name-" + i).innerText = className;

                // Atualiza a barra de progresso
                const progressBar = document.getElementById("class-progress-" + i);
                progressBar.style.width = probability + "%";
                progressBar.innerHTML = probability + "%";

                // Lógica de cores baseada no nível de confiança (Bootstrap Colors)
                progressBar.className = "progress-bar progress-bar-striped progress-bar-animated ";
                if (probability > 80) {
                    progressBar.classList.add("bg-success"); // Verde para alta confiança
                } else if (probability > 40) {
                    progressBar.classList.add("bg-warning", "text-dark"); // Amarelo para média
                } else {
                    progressBar.classList.add("bg-danger"); // Vermelho para baixa
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
